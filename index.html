<h2 class="sr-only">Interactive tokenization fable — type any word or phrase and see how three AI scribes would split it into tokens differently</h2>

<style>
  .fable-wrap { padding: 1.5rem 0; font-family: var(--font-sans); }
  .fable-title { font-family: var(--font-serif); font-size: 18px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 4px; }
  .fable-sub { font-size: 14px; color: var(--color-text-secondary); margin-bottom: 1.5rem; }
  .input-row { display: flex; gap: 10px; align-items: center; margin-bottom: 2rem; }
  .input-row input { flex: 1; font-family: var(--font-mono); }
  .scribes { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 12px; }
  .scribe-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1rem 1.25rem; }
  .scribe-top { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .scribe-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 500; flex-shrink: 0; }
  .scribe-name { font-size: 14px; font-weight: 500; color: var(--color-text-primary); }
  .scribe-trait { font-size: 11px; color: var(--color-text-tertiary); }
  .chips { display: flex; flex-wrap: wrap; gap: 5px; min-height: 32px; margin-bottom: 10px; }
  .chip { font-family: var(--font-mono); font-size: 12px; font-weight: 500; padding: 4px 8px; border-radius: 6px; border: 1px solid; cursor: default; position: relative; }
  .chip:hover .chip-tip { display: block; }
  .chip-tip { display: none; position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%); background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: 6px; padding: 4px 8px; font-size: 11px; white-space: nowrap; z-index: 10; color: var(--color-text-secondary); font-family: var(--font-sans); font-weight: 400; }
  .ids-row { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
  .id-chip { font-family: var(--font-mono); font-size: 10px; color: var(--color-text-tertiary); background: var(--color-background-secondary); border-radius: 4px; padding: 2px 5px; }
  .stat-row { display: flex; gap: 12px; padding-top: 10px; border-top: 0.5px solid var(--color-border-tertiary); }
  .stat { text-align: center; flex: 1; }
  .stat-n { font-size: 20px; font-weight: 500; color: var(--color-text-primary); line-height: 1; margin-bottom: 2px; }
  .stat-l { font-size: 11px; color: var(--color-text-tertiary); }
  .moral-box { margin-top: 1.5rem; background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 1rem 1.25rem; }
  .moral-text { font-family: var(--font-serif); font-style: italic; font-size: 14px; color: var(--color-text-secondary); line-height: 1.7; margin: 0; }
  .diff-badge { font-size: 11px; font-weight: 500; padding: 2px 7px; border-radius: 99px; margin-left: 6px; }
</style>

<div class="fable-wrap">
  <p class="fable-title">The fable of the three scribes</p>
  <p class="fable-sub">Type any word or phrase. Each kingdom splits it differently.</p>

  <div class="input-row">
    <input type="text" id="word-input" value="tokenization" maxlength="60" placeholder="type anything…" aria-label="Word or phrase to tokenize" />
    <button onclick="tokenize()" aria-label="Tokenize">Tokenize</button>
  </div>

  <div class="scribes" id="scribes-grid"></div>

  <div class="moral-box">
    <p class="moral-text" id="moral-text"></p>
  </div>
</div>

<script>
const SCRIBES = [
  {
    name: 'First scribe',
    trait: 'trained on code & prose',
    color: { bg: '#E6F1FB', border: '#185FA5', text: '#0C447C', avatarBg: '#B5D4F4', avatarText: '#0C447C' },
    rules: [
      { pat: /^(tion|ation|ization|ise|ize|ed|ing|er|est|ly|ness|ment|ful|less|able|ible|ous|ive|al|ic|ity|ary|ory|ery|un|re|pre|dis|mis|non|over|under|out|up|down|in|im|ir|il)$/, merge: false },
      { split: 'suffix', suffixes: ['tion','ation','ization','ise','ize','ness','ment','ful','less','able','ible','ous','ive','ity','ary','ory','ing','ed','er','ly','al','ic'] }
    ],
    tokenize: greedySplit
  },
  {
    name: 'Second scribe',
    trait: 'trained mostly on prose',
    color: { bg: '#FAEEDA', border: '#854F0B', text: '#633806', avatarBg: '#FAC775', avatarText: '#633806' },
    rules: [],
    tokenize: proseSplit
  },
  {
    name: 'Third scribe',
    trait: 'finest granularity',
    color: { bg: '#EAF3DE', border: '#3B6D11', text: '#27500A', avatarBg: '#C0DD97', avatarText: '#27500A' },
    rules: [],
    tokenize: fineSplit
  }
];

function hashStr(s) {
  let h = 5381;
  for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0;
  return (h % 49000) + 1000;
}

const SUFFIXES = ['ization','isation','ation','ition','tion','sion','ness','ment','ful','less','able','ible','ously','ious','ous','ive','ity','ary','ory','ery','ing','edly','edly','ed','er','est','ly','al','ic','ism','ist','ize','ise'];
const PREFIXES = ['un','re','pre','dis','mis','non','over','under','out','inter','intra','extra','anti','auto','bi','co','de','ex','in','im','ir','il','trans','sub','super','semi'];

function greedySplit(word) {
  const w = word.toLowerCase();
  const tokens = [];
  let i = 0;
  while (i < w.length) {
    let matched = false;
    for (const sfx of SUFFIXES) {
      if (w.endsWith(sfx) && i === w.length - sfx.length && sfx.length < w.length - i) {
        tokens.push(word.slice(i, w.length - sfx.length));
        tokens.push(word.slice(w.length - sfx.length));
        i = w.length;
        matched = true;
        break;
      }
    }
    if (!matched) {
      for (const pfx of PREFIXES) {
        if (w.startsWith(pfx, i) && i + pfx.length < w.length) {
          tokens.push(word.slice(i, i + pfx.length));
          i += pfx.length;
          matched = true;
          break;
        }
      }
    }
    if (!matched) {
      const remaining = word.slice(i);
      tokens.push(remaining);
      i = w.length;
    }
  }
  return tokens.filter(t => t.length > 0);
}

function proseSplit(word) {
  const w = word.toLowerCase();
  for (const sfx of ['ization','isation','ation','ition','tion','ness','ment','able','ible','ously','ious','ous']) {
    if (w.endsWith(sfx) && w.length > sfx.length + 2) {
      return [word.slice(0, w.length - sfx.length), word.slice(w.length - sfx.length)];
    }
  }
  if (w.length <= 6) return [word];
  const mid = Math.ceil(w.length * 0.55);
  return [word.slice(0, mid), word.slice(mid)];
}

function fineSplit(word) {
  const w = word.toLowerCase();
  const tokens = [];
  let i = 0;
  while (i < w.length) {
    let matched = false;
    const pfxList = ['tion','ation','ization','ness','ment','ing','ed','er','est','ly','al','ic','un','re','pre','dis','mis','non','ize','ise','ous','ive','ity','ary','ory','ion','iz','at','or','er','an','en','in','on','un'];
    for (const p of pfxList) {
      if (w.startsWith(p, i) && i + p.length <= w.length) {
        tokens.push(word.slice(i, i + p.length));
        i += p.length;
        matched = true;
        break;
      }
    }
    if (!matched) {
      const chunkLen = Math.min(2, w.length - i);
      tokens.push(word.slice(i, i + chunkLen));
      i += chunkLen;
    }
  }
  return tokens.filter(t => t.length > 0);
}

function wordTokens(scribeIdx, fullText) {
  const words = fullText.trim().split(/\s+/);
  const result = [];
  words.forEach((word, wi) => {
    if (!word) return;
    const chunks = SCRIBES[scribeIdx].tokenize(word);
    chunks.forEach(c => result.push(c));
    if (wi < words.length - 1) result.push(' ');
  });
  return result.filter(t => t.trim().length > 0 || t === ' ').filter(t => t !== ' ');
}

function avgCost(count) {
  return (count * 0.0015 / 1000 * 1000000).toFixed(2);
}

function tokenize() {
  const raw = document.getElementById('word-input').value.trim() || 'tokenization';
  const grid = document.getElementById('scribes-grid');
  const allCounts = SCRIBES.map((_, i) => wordTokens(i, raw).length);
  const minCount = Math.min(...allCounts);

  grid.innerHTML = SCRIBES.map((s, si) => {
    const tokens = wordTokens(si, raw);
    const count = tokens.length;
    const cost = avgCost(count);
    const isCheapest = count === minCount;

    const chipsHtml = tokens.map(t => {
      const id = hashStr(t + si);
      return `<span class="chip" style="background:${s.color.bg};border-color:${s.color.border};color:${s.color.text}">${t}<span class="chip-tip">ID: ${id}</span></span>`;
    }).join('');

    const idsHtml = tokens.map(t => `<span class="id-chip">${hashStr(t + si)}</span>`).join('');

    const cheapBadge = isCheapest ? `<span class="diff-badge" style="background:${s.color.bg};color:${s.color.text}">fewest tokens</span>` : '';

    return `<div class="scribe-card">
      <div class="scribe-top">
        <div class="scribe-avatar" style="background:${s.color.avatarBg};color:${s.color.avatarText}">${si+1}</div>
        <div>
          <div class="scribe-name">${s.name}${cheapBadge}</div>
          <div class="scribe-trait">${s.trait}</div>
        </div>
      </div>
      <div class="chips">${chipsHtml}</div>
      <div class="ids-row">${idsHtml}</div>
      <div class="stat-row">
        <div class="stat"><div class="stat-n">${count}</div><div class="stat-l">tokens</div></div>
        <div class="stat"><div class="stat-n">${cost}¢</div><div class="stat-l">per 1M chars</div></div>
      </div>
    </div>`;
  }).join('');

  updateMoral(raw, allCounts);
}

function updateMoral(word, counts) {
  const [a, b, c] = counts;
  const diff = Math.max(...counts) - Math.min(...counts);
  let moral = '';
  if (diff === 0) {
    moral = `All three scribes agreed on "${word}" — ${a} token${a!==1?'s':''}. Some words are so common that every kingdom has memorised them whole.`;
  } else {
    moral = `The same word "${word}" cost the first scribe ${a} token${a!==1?'s':''}, the second ${b}, the third ${c}. The kingdoms do not share a dictionary — and so the same message carries a different price in each.`;
  }
  document.getElementById('moral-text').textContent = moral;
}

document.getElementById('word-input').addEventListener('keydown', e => { if (e.key === 'Enter') tokenize(); });
document.getElementById('word-input').addEventListener('input', tokenize);
tokenize();
</script>
